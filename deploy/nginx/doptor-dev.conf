# Doptor dev — host nginx reverse proxy.
# Copy to /etc/nginx/sites-available/ and symlink into sites-enabled/.
# certbot --nginx will add the SSL (443) blocks automatically; leave this as HTTP-only.
# Does NOT set default_server, so your other sites are unaffected.

# --- Frontend (Next.js) ---
server {
    listen 80;
    listen [::]:80;
    server_name doptor-dev.duckdns.org;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

# --- Backend API (NestJS + Socket.IO) ---
server {
    listen 80;
    listen [::]:80;
    server_name api.doptor-dev.duckdns.org;

    # Allow larger request bodies (bulk uploads).
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
