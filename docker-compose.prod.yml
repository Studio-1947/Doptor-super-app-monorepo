services:
  postgres:
    image: postgres:16-alpine
    container_name: doptor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - doptor-postgres-data:/var/lib/postgresql/data
    # No public port mapping: only the api container talks to it over the internal network.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/api/Dockerfile
    container_name: doptor-api
    restart: unless-stopped
    # Bound to localhost only; the host nginx reverse-proxies to it.
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: frontend/web/Dockerfile
      args:
        # Baked into the client bundle at build time.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: doptor-web
    restart: unless-stopped
    # Bound to localhost only; the host nginx reverse-proxies to it.
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api

volumes:
  doptor-postgres-data:
